# Set the prefix key to Ctrl+t
set -g prefix C-t
unbind C-b
bind C-t send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'egel/tmux-gruvbox'

# Set tmux-gruvbox theme
set -g @tmux-gruvbox 'light'


# Pane navigation
bind-key -n C-h select-pane -L
bind-key -n C-j select-pane -D
bind-key -n C-k select-pane -U
bind-key -n C-l select-pane -R

# Pane splitting
bind | split-window -h 
bind - split-window -v
unbind '"'
unbind %

# Pane resizing
bind-key -r -T prefix Up resize-pane -U 5
bind-key -r -T prefix Down resize-pane -D 5
bind-key -r -T prefix Left resize-pane -L 5
bind-key -r -T prefix Right resize-pane -R 5

# Reload configuration with leader r
bind r source-file ~/.config/tmux/tmux.conf

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if-shell 'test -d ~/.config/tmux/plugins/tpm' 'run ~/.config/tmux/plugins/tpm/tpm' 'display-message "TPM not found!"'
